# ==============================================================================
# UI/UX CONFIGURATION
# ==============================================================================
# Visual styling and output configuration
# ==============================================================================

# ==============================================================================
# COLOR SCHEME
# ==============================================================================
# ANSI color codes for terminal output
# ==============================================================================

COLOR_RED='\033[0;31m'
COLOR_GREEN='\033[0;32m'
COLOR_YELLOW='\033[1;33m'
COLOR_BLUE='\033[0;34m'
COLOR_CYAN='\033[0;36m'
COLOR_GRAY='\033[0;90m'
COLOR_WHITE='\033[1;37m'
COLOR_NC='\033[0m' # No Color
COLOR_BOLD='\033[1m'
COLOR_DIM='\033[2m'

# ==============================================================================
# BANNER CONFIGURATION
# ==============================================================================

BANNER_WIDTH=40
BANNER_BORDER_CHAR="="
BANNER_SEPARATOR_CHAR="─"

# ==============================================================================
# ICONS AND SYMBOLS
# ==============================================================================

ICON_SUCCESS="✓"
ICON_ERROR="✗"
ICON_WARNING="⚠"
ICON_INFO="ℹ"
ICON_STEP="▶"

# ==============================================================================
# OUTPUT FORMATS
# ==============================================================================

# Step format: [STEP 1] Description
STEP_FORMAT="[STEP %d] %s"

# Section format with separator
SECTION_FORMAT="%s"

# ==============================================================================
# PROMPT CONFIGURATION
# ==============================================================================

PROMPT_SUFFIX=": "
PROMPT_DEFAULT_FORMAT=" (default: %s)"
