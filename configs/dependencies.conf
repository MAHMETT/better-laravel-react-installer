# ==============================================================================
# DEPENDENCY CONFIGURATION
# ==============================================================================
# Required dependencies and verification settings
# ==============================================================================

# ==============================================================================
# REQUIRED DEPENDENCIES
# ==============================================================================
# These must exist for installation to proceed
# ==============================================================================

declare -a REQUIRED_COMMANDS
REQUIRED_COMMANDS=("php" "composer" "git")

# ==============================================================================
# OPTIONAL DEPENDENCIES (AT LEAST ONE REQUIRED)
# ==============================================================================
# Node runtimes - at least one must exist
# ==============================================================================

declare -a NODE_RUNTIMES
NODE_RUNTIMES=("npm" "pnpm" "yarn" "bun")

# ==============================================================================
# VERSION CHECKS
# ==============================================================================

# Minimum PHP version (optional - set empty to skip version check)
MIN_PHP_VERSION=""

# Minimum Composer version (optional - set empty to skip version check)
MIN_COMPOSER_VERSION=""

# ==============================================================================
# ERROR MESSAGES
# ==============================================================================

ERROR_PHP_MISSING="Missing dependency detected:
- php
Installation cannot continue."

ERROR_COMPOSER_MISSING="Missing dependency detected:
- composer
Installation cannot continue."

ERROR_GIT_MISSING="Missing dependency detected:
- git
Installation cannot continue."

ERROR_NODE_RUNTIME_MISSING="Missing dependency detected:
- npm OR pnpm OR yarn OR bun (at least one required)
Installation cannot continue."
