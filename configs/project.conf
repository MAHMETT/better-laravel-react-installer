# ==============================================================================
# PROJECT CONFIGURATION
# ==============================================================================
# Central configuration file for Better Laravel React Installer
# ==============================================================================

# Project Information
PROJECT_TITLE="Better Laravel React"
PROJECT_SUBTITLE="Interactive Laravel Starter Installer"
REPO_URL="https://github.com/MAHMETT/better-laravel-react.git"

# ==============================================================================
# BRANCH CONFIGURATION
# ==============================================================================
# Define available branches for selection
# Format: TITLE|BRANCH_NAME
# ==============================================================================

declare -a BRANCHES
BRANCHES=(
    "main|main"
    "+ visitor management|visitor-management"
)

# Default branch
DEFAULT_BRANCH_INDEX=1

# ==============================================================================
# RUNTIME CONFIGURATION
# ==============================================================================
# Define available Node runtimes
# ==============================================================================

declare -a RUNTIMES
RUNTIMES=("npm" "pnpm" "yarn" "bun")

# Default runtime
DEFAULT_RUNTIME="npm"

# ==============================================================================
# VALIDATION RULES
# ==============================================================================

# Project name validation
PROJECT_NAME_MAX_LENGTH=200
PROJECT_NAME_PATTERN="^[a-z0-9_-]+$"

# ==============================================================================
# FILES TO CLEANUP
# ==============================================================================
# Files and folders to remove after cloning
# ==============================================================================

# Folders to remove
CLEANUP_FOLDERS=(
    "docs"
    ".agents"
    ".claude"
    ".codex"
    ".qwen"
    ".git"
    ".github"
)

# Files to remove
CLEANUP_FILES=(
    ".bunrc"
    "bun.lock"
    "mcp.json"
    "AGENTS.md"
    "CLAUDE.md"
    "QWEN.md"
    "boost.json"
    "_ide_helper.php"
    "opencode.json"
)

# ==============================================================================
# INSTALLATION DEFAULTS
# ==============================================================================

# Default installation options
DEFAULT_INSTALL_COMPOSER=true
DEFAULT_INSTALL_NODE=true
