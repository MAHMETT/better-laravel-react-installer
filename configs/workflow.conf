# ==============================================================================
# INSTALLATION WORKFLOW CONFIGURATION
# ==============================================================================
# Step-by-step installation process configuration
# ==============================================================================

# ==============================================================================
# INSTALLATION STEPS
# ==============================================================================
# Ordered list of installation steps
# ==============================================================================

declare -a INSTALLATION_STEPS
INSTALLATION_STEPS=(
    "clone_repository"
    "enter_project_directory"
    "checkout_branch"
    "cleanup_files"
    "setup_environment"
    "install_dependencies"
)

# ==============================================================================
# STEP DESCRIPTIONS
# ==============================================================================

STEP_CLONE_REPO="Cloning repository..."
STEP_ENTER_DIR="Entering project directory..."
STEP_CHECKOUT_BRANCH="Switching to branch..."
STEP_CLEANUP="Cleaning project files..."
STEP_ENV_SETUP="Setting up environment..."
STEP_INSTALL_DEPS="Installing dependencies..."

# ==============================================================================
# ENVIRONMENT SETUP
# ==============================================================================

ENV_SOURCE_FILE=".env.example"
ENV_TARGET_FILE=".env"
ARTISAN_KEY_GENERATE=true

# ==============================================================================
# DEPENDENCY INSTALLATION COMMANDS
# ==============================================================================

COMPOSER_INSTALL_CMD="composer install --no-interaction"
NPM_INSTALL_CMD="npm install"
PNPM_INSTALL_CMD="pnpm install"
YARN_INSTALL_CMD="yarn install"
BUN_INSTALL_CMD="bun install"

# ==============================================================================
# COMPLETION MESSAGE
# ==============================================================================

COMPLETION_TITLE="Installation Complete"
COMPLETION_MESSAGE="Installation completed successfully!"
COMPLETION_NEXT_STEPS="You can now start development."
